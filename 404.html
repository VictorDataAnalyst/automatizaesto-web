<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Página no encontrada — automatizaesto</title>
<meta name="robots" content="noindex" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#0a0a0b" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c5cff'/><text x='16' y='23' font-family='monospace' font-size='20' font-weight='700' text-anchor='middle' fill='%230a0a0b'>&#955;</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0b;
    --bg-card: #15151a;
    --border: #26262d;
    --ink: #f2f0ea;
    --ink-dim: #8a8a94;
    --accent: #7c5cff;
    --grid: rgba(255,255,255,0.035);
    --serif: 'Fraunces', 'Times New Roman', serif;
    --sans: 'Inter Tight', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 72px 72px;
    pointer-events: none;
  }
  .card {
    position: relative;
    text-align: center;
    max-width: 560px;
    padding: 56px 40px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
  }
  .code {
    font-family: var(--mono);
    font-size: .85rem;
    color: var(--accent);
    letter-spacing: .2em;
    margin-bottom: 18px;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    line-height: 1.15;
    margin-bottom: 14px;
  }
  h1 em { color: var(--accent); font-style: italic; }
  p { color: var(--ink-dim); font-size: 1rem; line-height: 1.6; margin-bottom: 30px; }
  .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-block;
    padding: 12px 26px;
    border-radius: 12px;
    font-weight: 600;
    font-size: .92rem;
    text-decoration: none;
    transition: opacity .2s, background .2s;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { opacity: .85; }
  .btn-ghost { border: 1px solid var(--border); color: var(--ink-dim); }
  .btn-ghost:hover { background: #1c1c22; color: var(--ink); }
</style>
</head>
<body>
  <main class="card">
    <div class="code">ERROR · 404</div>
    <h1>Esta página se nos <em>automatizó</em> de las manos.</h1>
    <p>La dirección que buscas no existe o fue movida. Pero lo importante sigue en su sitio.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Volver al inicio</a>
      <a class="btn btn-ghost" href="/blog/">Visitar el blog</a>
    </div>
  </main>
<script src="/assets/consent.js" defer></script>
</body>
</html>
