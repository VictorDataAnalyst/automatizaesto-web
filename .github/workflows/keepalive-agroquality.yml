# Keep-alive para AgroQuality en Render (plan free).
# Render duerme el servicio tras ~15 min sin tráfico → el primer request
# del cliente tardaría ~50s en despertar. Este ping cada 14 min lo mantiene
# caliente para que el lanzamiento tenga una primera carga instantánea.
#
# Coste: 0. Usa el health endpoint /api/config (no requiere auth ni datos).
# Nota: una sola instancia siempre caliente cabe en las ~750h/mes del free tier.
name: keepalive-agroquality

on:
  schedule:
    - cron: "*/14 * * * *"   # cada 14 minutos
  workflow_dispatch:          # permite dispararlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -m 60 https://agroquality.automatizaesto.com/api/config)
          echo "HTTP $code"
          # 200 = despierto. No fallamos el job por un cold-start ocasional.
          if [ "$code" != "200" ]; then
            echo "::warning::Respuesta $code (posible cold start; se reintenta en el próximo ciclo)"
          fi
